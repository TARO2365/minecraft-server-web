<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อมูลเซิร์ฟเวอร์ Minecraft — OneBlock RPG</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">

    <!-- หัวเว็บ: ข้อมูลเซิฟ -->
    <header class="hero" id="hero"></header>

    <!-- Web Panel: ควบคุมเซิร์ฟ + จอ CMD สด -->
    <section class="panel">
      <div class="panel-bar">
        <span id="statusPill" class="status-pill off">● กำลังเช็ก...</span>
        <span id="uptime" class="uptime"></span>
        <div class="panel-btns">
          <button id="btnStart" class="pbtn run" disabled>▶ Run เซิร์ฟ</button>
          <button id="btnStop" class="pbtn stop" disabled>⏹ Stop</button>
          <button id="btnConfig" class="pbtn cfg">⚙ ตั้งค่าเซิร์ฟ</button>
        </div>
      </div>
      <div class="console">
        <div class="console-bar">
          <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
          <span class="console-title">Server Console — logs/latest.log (สด)</span>
          <label class="autoscroll"><input type="checkbox" id="autoScroll" checked> เลื่อนตาม</label>
        </div>
        <div class="console-body live" id="console"></div>
        <form class="cmd-bar" id="cmdForm">
          <span class="cmd-slash">/</span>
          <input type="text" id="cmdInput" placeholder="พิมพ์คำสั่ง console เช่น say สวัสดี, list, whitelist add ..." autocomplete="off">
          <button type="submit" class="pbtn send">ส่ง</button>
        </form>
      </div>
      <div class="quick-cmds" id="quickCmds"></div>
    </section>

    <!-- ปลั๊กอิน -->
    <h2 class="sec-title">ปลั๊กอินที่ติดตั้ง (กดการ์ดเพื่อดูรายละเอียด)</h2>
    <div class="filters" id="filters"></div>
    <div class="grid" id="grid"></div>

    <!-- ปลั๊กอินที่ยังขาด -->
    <h2 class="sec-title missing">ปลั๊กอินที่ยังขาด — ตามแผนพัฒนา</h2>
    <div class="planned-grid" id="planned"></div>

    <!-- ตัวอย่างการเชื่อมปลั๊กอิน -->
    <h2 class="sec-title flows">ปลั๊กอินคุยกันยังไง — ตัวอย่างวงจรจริง</h2>
    <div class="flows" id="flows"></div>

    <footer id="footer"></footer>
  </div>

  <!-- modal ดีเทลปลั๊กอิน -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
  </div>

  <!-- modal ตั้งค่าเซิร์ฟ (server.properties) -->
  <div class="overlay" id="cfgOverlay">
    <div class="modal" id="cfgModal"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
